<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니 챌린지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e5e5e5; max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { margin-bottom: 24px; font-size: 28px; }
    h2 { margin: 24px 0 12px; font-size: 18px; color: #a3a3a3; }
    button { background: #262626; color: #e5e5e5; border: 1px solid #404040; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #333; }
    input, select { background: #1a1a1a; color: #e5e5e5; border: 1px solid #333; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1f1f1f; }
    .summary-row { display: flex; justify-content: space-between; padding: 6px 0; }
    .summary-total { font-size: 20px; font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 2px solid #333; }
    .empty { color: #525252; font-style: italic; padding: 12px 0; }
    .error { color: #ef4444; }
    .success { color: #22c55e; }
    .hint { color: #525252; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>🛒 장바구니 챌린지</h1>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
